name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and smoke-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dev dependencies
        run: npm install

      - name: Type-check + build
        run: npm run build

      - name: Smoke test — help
        run: node dist/cli.js --help

      - name: Smoke test — unknown subcommand exits non-zero
        shell: bash
        run: |
          if node dist/cli.js __not_a_real_command__; then
            echo "Expected non-zero exit, got success" >&2
            exit 1
          fi

      - name: Smoke test — missing required flag exits non-zero
        shell: bash
        run: |
          if node dist/cli.js connect; then
            echo "Expected non-zero exit, got success" >&2
            exit 1
          fi

      - name: Confirm dist/ is in sync with src/
        shell: bash
        run: |
          rm -rf dist
          npm run build
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit." >&2
            echo "--- diff --stat ---"
            git --no-pager diff --stat dist/
            echo "--- full diff (first 80 lines) ---"
            git --no-pager diff dist/ | head -80
            exit 1
          fi
